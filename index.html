<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Northaven Farms Recipe Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Lato', sans-serif; background: #f4f1e8; min-height: 100vh; color: #2d3a1e; -webkit-text-size-adjust: 100%; }

  .app-header { background: #2d4a1e; padding: 16px 20px; padding-top: max(16px, env(safe-area-inset-top)); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .app-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: #e8f0d8; letter-spacing: 0.3px; }
  .app-title span { color: #9dc854; font-style: italic; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .btn-outline { background: transparent; border: 1.5px solid #9dc854; color: #9dc854; padding: 9px 16px; border-radius: 20px; font-family: 'Lato', sans-serif; font-size: 13px; cursor: pointer; min-height: 44px; display: flex; align-items: center; }
  .btn-outline:active { background: #9dc854; color: #1a2e0a; }
  .btn-primary { background: #9dc854; border: none; color: #1a2e0a; padding: 9px 16px; border-radius: 20px; font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; min-height: 44px; display: flex; align-items: center; }
  .btn-primary:active { background: #b8d96f; }

  /* GARDEN GRID */
  .garden-view { padding: 20px 16px; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
  .section-label { font-family: 'Playfair Display', serif; font-size: 14px; color: #5c7a3a; margin-bottom: 16px; letter-spacing: 0.3px; }
  .veggie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }

  .veggie-tile { background: #ffffff; border-radius: 14px; overflow: hidden; cursor: pointer; border: 1.5px solid #d8e8c0; position: relative; transition: transform 0.15s, box-shadow 0.15s; }
  .veggie-tile:active { transform: scale(0.97); }
  @media (hover: hover) { .veggie-tile:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(45,74,30,0.18); border-color: #9dc854; } }
  .veggie-photo-wrap { position: relative; overflow: hidden; height: 120px; background: #c8dca8; }
  .veggie-photo { width: 100%; height: 120px; object-fit: cover; display: block; }
  .veggie-badge { position: absolute; top: 8px; left: 8px; background: #2d4a1e; color: #9dc854; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 10px; z-index: 2; }
  .veggie-info { padding: 10px 12px 12px; }
  .veggie-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: #2d3a1e; margin-bottom: 2px; }
  .veggie-count { font-size: 11px; color: #7a9a5a; }

  /* NUTRITION BUTTON ON TILE */
  .nutrition-btn {
    position: absolute; bottom: 8px; right: 8px;
    width: 32px; height: 32px;
    background: #2d4a1e; color: #9dc854;
    border-radius: 50%; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 5; border: none;
    font-family: 'Lato', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .nutrition-btn:active { background: #4a7a2a; }

  /* NUTRITION MODAL (replaces popup for clarity) */
  .nut-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(20,35,10,0.55); z-index: 300; align-items: flex-end; justify-content: center; }
  .nut-modal-overlay.show { display: flex; }
  .nut-modal {
    background: #f4f1e8; border-radius: 20px 20px 0 0;
    padding: 24px 24px max(24px, env(safe-area-inset-bottom));
    width: 100%; max-width: 540px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .nut-modal-handle { width: 40px; height: 4px; background: #c8d8a8; border-radius: 2px; margin: 0 auto 18px; }
  .nut-modal-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: #2d3a1e; margin-bottom: 6px; }
  .nut-modal-blurb { font-size: 13px; color: #5c7a3a; line-height: 1.5; margin-bottom: 18px; }
  .nut-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 6px; }
  .nut-card { background: #fff; border-radius: 12px; border: 1.5px solid #d8e8c0; padding: 12px 14px; }
  .nut-card-val { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: #3d6428; }
  .nut-card-label { font-size: 11px; color: #7a9a5a; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .nut-per { font-size: 11px; color: #9aaa8a; text-align: right; margin-top: 4px; }
  .nut-close-btn { background: #2d4a1e; color: #9dc854; border: none; border-radius: 12px; padding: 14px; font-family: 'Lato', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 16px; }

  /* DETAIL VIEW */
  .detail-view { display: none; }
  .back-bar { background: #2d4a1e; padding: 12px 16px; position: sticky; top: 56px; z-index: 90; }
  .back-btn-big { background: #9dc854; color: #1a2e0a; border: none; border-radius: 20px; padding: 10px 20px; font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; min-height: 44px; }
  .back-btn-big:active { background: #b8d96f; }
  .detail-hero { position: relative; height: 220px; overflow: hidden; background: #c8dca8; }
  .detail-hero-photo { width: 100%; height: 100%; object-fit: cover; display: block; }
  .detail-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(20,40,10,0.88) 0%, rgba(20,40,10,0.15) 60%); display: flex; align-items: flex-end; padding: 20px 20px; }
  .detail-hero-text h2 { font-family: 'Playfair Display', serif; font-size: 28px; color: #e8f0d8; font-weight: 600; }
  .detail-hero-text p { font-size: 13px; color: #9dc854; margin-top: 4px; }
  .detail-body { padding: 20px 16px; padding-bottom: max(20px, env(safe-area-inset-bottom)); }

  /* NUTRITION STRIP ON DETAIL */
  .nutrition-strip-wrap { margin-bottom: 20px; }
  .nutrition-strip-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .nutrition-strip-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: #2d3a1e; }
  .nutrition-strip { background: #fff; border-radius: 12px; border: 1.5px solid #d8e8c0; padding: 14px 16px; display: flex; gap: 0; }
  .nut-stat { flex: 1; text-align: center; padding: 0 6px; border-right: 1px solid #d8e8c0; }
  .nut-stat:last-child { border-right: none; }
  .nut-stat-val { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: #3d6428; }
  .nut-stat-label { font-size: 9px; color: #7a9a5a; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; }
  .nutrition-blurb { font-size: 13px; color: #5c7a3a; line-height: 1.5; margin-top: 10px; background: #f0f4e8; border-radius: 10px; padding: 10px 14px; border: 1px solid #d8e8c0; }

  .recipes-heading { font-family: 'Playfair Display', serif; font-size: 18px; color: #2d3a1e; margin-bottom: 14px; font-weight: 600; }
  .recipe-card { background: #fff; border-radius: 12px; border: 1.5px solid #d8e8c0; padding: 16px 18px; margin-bottom: 12px; cursor: pointer; min-height: 44px; }
  .recipe-card:active { border-color: #9dc854; background: #f8fdf0; }
  @media (hover: hover) { .recipe-card:hover { border-color: #9dc854; transform: translateX(3px); } }
  .recipe-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .recipe-card-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: #2d3a1e; }
  .recipe-link-icon { font-size: 16px; color: #9dc854; flex-shrink: 0; }
  .recipe-shared-by { font-size: 11px; color: #7a9a5a; margin-top: 4px; }
  .no-recipes { background: #f0f4e8; border-radius: 12px; padding: 20px; text-align: center; color: #7a9a5a; font-size: 14px; border: 1.5px dashed #c0d890; }
  .add-recipe-btn { background: #2d4a1e; color: #9dc854; border: none; border-radius: 12px; padding: 16px 20px; font-family: 'Lato', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 16px; min-height: 52px; }
  .add-recipe-btn:active { background: #3d6428; }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(20,35,10,0.6); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #f4f1e8; border-radius: 20px 20px 0 0; padding: 28px 24px max(28px, env(safe-area-inset-bottom)); width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.25s ease; }
  .modal h3 { font-family: 'Playfair Display', serif; font-size: 20px; color: #2d3a1e; margin-bottom: 20px; font-weight: 600; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; color: #5c7a3a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 13px 14px; border-radius: 10px; border: 1.5px solid #c0d890; background: #fff; font-family: 'Lato', sans-serif; font-size: 16px; color: #2d3a1e; outline: none; -webkit-appearance: none; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #9dc854; }
  .form-group textarea { height: 110px; resize: none; font-size: 15px; }
  .radio-group { display: flex; gap: 12px; }
  .radio-label { display: flex; align-items: center; gap: 8px; font-size: 15px; color: #2d3a1e; cursor: pointer; padding: 10px 0; min-height: 44px; }
  .radio-label input[type="radio"] { width: 20px; height: 20px; accent-color: #2d4a1e; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel { flex: 1; background: transparent; border: 1.5px solid #c0d890; color: #5c7a3a; padding: 14px; border-radius: 12px; font-family: 'Lato', sans-serif; font-size: 15px; cursor: pointer; min-height: 52px; }
  .btn-submit { flex: 2; background: #2d4a1e; border: none; color: #9dc854; padding: 14px; border-radius: 12px; font-family: 'Lato', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; min-height: 52px; }
  .btn-submit:active { background: #3d6428; }
  .username-bar { background: #e8f2d4; border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; font-size: 14px; color: #3d6428; }

  .admin-panel { background: #fff; border-radius: 12px; border: 1.5px solid #d8e8c0; padding: 16px; margin-bottom: 20px; }
  .admin-panel h4 { font-family: 'Playfair Display', serif; font-size: 16px; color: #2d3a1e; margin-bottom: 12px; font-weight: 600; }
  .pending-user-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid #e8f0d8; gap: 10px; }
  .pending-user-row:last-child { border-bottom: none; }
  .pending-user-name { font-size: 15px; color: #2d3a1e; font-weight: 700; }
  .pending-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-approve { background: #2d4a1e; color: #9dc854; border: none; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Lato', sans-serif; min-height: 44px; }
  .btn-deny { background: transparent; color: #c05030; border: 1.5px solid #c05030; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Lato', sans-serif; min-height: 44px; }

  .toast { position: fixed; bottom: max(24px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: #2d4a1e; color: #9dc854; padding: 13px 24px; border-radius: 24px; font-size: 14px; font-weight: 700; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  @media (min-width: 600px) {
    .app-header { padding: 18px 28px; }
    .app-title { font-size: 20px; }
    .garden-view { padding: 28px; }
    .veggie-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    .modal-overlay, .nut-modal-overlay { align-items: center; }
    .modal, .nut-modal { border-radius: 16px; max-height: 80vh; }
    .back-bar { top: 62px; }
    .detail-body { padding: 24px 28px; }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">Northaven Farms <span>Recipe Book</span></div>
  <div class="header-actions">
    <button class="btn-outline" id="loginBtn">Sign In</button>
    <button class="btn-primary" id="addBtn">+ Add Recipe</button>
  </div>
</div>

<div class="garden-view" id="gardenView">
  <p class="section-label">🌿 Pick a vegetable to explore recipes — tap ⓘ for nutrition facts</p>
  <div class="veggie-grid" id="veggieGrid"></div>
</div>

<div class="detail-view" id="detailView">
  <div class="back-bar">
    <button class="back-btn-big" id="backBtn">&#8592; Back to Garden</button>
  </div>
  <div class="detail-hero" id="detailHero"></div>
  <div class="detail-body" id="detailBody"></div>
</div>

<!-- Nutrition Modal (bottom sheet) -->
<div class="nut-modal-overlay" id="nutModal">
  <div class="nut-modal" id="nutModalContent">
    <div class="nut-modal-handle"></div>
    <div class="nut-modal-title" id="nutModalTitle"></div>
    <div class="nut-modal-blurb" id="nutModalBlurb"></div>
    <div class="nut-modal-grid" id="nutModalGrid"></div>
    <div class="nut-per" id="nutModalPer"></div>
    <button class="nut-close-btn" id="nutCloseBtn">Done</button>
  </div>
</div>

<!-- Sign In Modal -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h3>🌱 Welcome to Northaven Farms</h3>
    <div class="form-group">
      <label>Your Username</label>
      <input type="text" id="usernameInput" placeholder="e.g. Carolyn, Jackie, Lauren..." autocorrect="off" autocapitalize="none"/>
    </div>
    <div class="form-group" id="passwordGroup" style="display:none;">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="Enter password"/>
    </div>
    <p style="font-size:13px;color:#7a9a5a;margin-bottom:12px;line-height:1.5;">You can browse anonymously, but a username is required to add recipes. New usernames need Denton's approval.</p>
    <div id="loginError" style="display:none;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:12px;line-height:1.5;"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="loginCancel">Browse anonymously</button>
      <button class="btn-submit" id="loginSubmit">Continue</button>
    </div>
  </div>
</div>

<!-- Add Recipe Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>🥬 Share a Recipe</h3>
    <div class="username-bar" id="addModalUserBar"></div>
    <div class="form-group">
      <label>Vegetable</label>
      <select id="recipeVeggie"></select>
    </div>
    <div class="form-group">
      <label>Recipe Name</label>
      <input type="text" id="recipeName" placeholder="e.g. Stuffed Zucchini"/>
    </div>
    <div class="form-group">
      <label>How are you sharing?</label>
      <div class="radio-group">
        <label class="radio-label"><input type="radio" name="shareType" value="link" checked> Link to recipe</label>
        <label class="radio-label"><input type="radio" name="shareType" value="text"> Type it out</label>
      </div>
    </div>
    <div class="form-group" id="linkGroup">
      <label>Recipe URL</label>
      <input type="url" id="recipeUrl" placeholder="https://..." inputmode="url"/>
    </div>
    <div class="form-group" id="textGroup" style="display:none;">
      <label>Recipe Text</label>
      <textarea id="recipeText" placeholder="Ingredients and steps..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="addCancel">Cancel</button>
      <button class="btn-submit" id="addSubmit">Share Recipe</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzMp9OmIyM-Ehr3YDh1VFu8yoswdwix1A",
  authDomain: "northaven-farms.firebaseapp.com",
  projectId: "northaven-farms",
  storageBucket: "northaven-farms.firebasestorage.app",
  messagingSenderId: "62561820539",
  appId: "1:62561820539:web:cf3714959030439db467de"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ADMIN_USER = 'Denton';
const ADMIN_PASS = 'admin';

const veggieData = [
  { id:'beans', name:'Beans', img:'images/beans.jpg',

    blurb:'Green beans are a great source of vitamins C and K, and their high fiber content supports healthy digestion. They\'re low in calories while delivering meaningful amounts of folate and iron.' },
  { id:'cantaloupe', name:'Cantaloupe', img:'images/cantaloupe.jpg',

    blurb:'Sweet corn provides a good balance of protein and fiber among vegetables, and contains lutein and zeaxanthin which support long-term eye health. It\'s also a natural source of B vitamins.' },
  { id:'cucumber', name:'Cucumber', img:'images/cucumber.jpg',
    nutrition:{calories:'16 kcal',protein:'0.7g',fiber:'0.5g',vitC:'3mg',per:'100g'},

  { id:'leeks', name:'Leeks', img:'images/leeks.jpg',
    nutrition:{calories:'61 kcal',protein:'1.5g',fiber:'1.8g',vitC:'12mg',per:'100g'},

  { id:'lettuce', name:'Lettuce', img:'images/lettuce.jpg',

  { id:'sweetpepper', name:'Sweet Peppers', img:'images/sweetpepper.jpg',

  { id:'strawberry', name:'Strawberry', img:'images/strawberry.jpg',
    nutrition:{calories:'32 kcal',protein:'0.7g',fiber:'2g',vitC:'59mg',per:'100g'},

const seedRecipes = [
  {veggieId:'cucumber',  name:'Tzatziki Sauce',                    by:'Carolyn', url:'https://www.themediterraneandish.com/tzatziki-sauce-recipe/#wprm-recipe-container-10608', text:''},
  {veggieId:'cucumber',  name:'Pickles',                           by:'Carolyn', url:'https://www.allrecipes.com/recipe/26857/microwave-bread-and-butter-pickles/', text:''},
  {veggieId:'cucumber',  name:'Cucumber, Tomato & Onion Asian Salad', by:'Denton', url:'https://www.allrecipes.com/recipe/237984/marinated-cucumber-onion-and-tomato-salad/', text:''},
  {veggieId:'leeks',     name:'Grilled Leeks',                     by:'Denton',  url:'https://veggiedesserts.com/grilled-leeks/', text:''},
  {veggieId:'leeks',     name:'Leek Mashed Potatoes',              by:'Carolyn', url:'https://www.lordbyronskitchen.com/leek-mashed-potatoes/', text:''},
  {veggieId:'okra',      name:'Roasted Okra',                      by:'Denton',  url:'https://www.allrecipes.com/recipe/204478/roasted-okra/', text:''},
  {veggieId:'okra',      name:'Okra & Tomatoes',                   by:'Denton',  url:'https://www.theseasonedmom.com/okra-and-tomatoes/#wprm-recipe-container-91880', text:''},
  {veggieId:'onion',     name:'French Onion Soup',                 by:'Denton',  url:'https://www.simplyrecipes.com/recipes/french_onion_soup/', text:''},
  {veggieId:'radish',    name:'Garlic Roasted Radishes',           by:'Denton',  url:'https://therealfooddietitians.com/garlic-roasted-radishes/', text:''},
  {veggieId:'squash',    name:'Squash Casserole',                  by:'Jackie',  url:'https://addapinch.com/squash-casserole-recipe/', text:''},
  {veggieId:'squash',    name:'Squash & Cornbread Casserole',      by:'Carolyn', url:'https://www.lanascooking.com/squash-and-cornbread-casserole/#recipe', text:''},
  {veggieId:'zucchini',  name:'Zucchini Fritters (Food.com)',      by:'Carolyn', url:'https://www.food.com/recipe/zucchini-fritters-7073', text:''},
  {veggieId:'zucchini',  name:'Zucchini Fritters (Damn Delicious)',by:'Carolyn', url:'https://damndelicious.net/2014/04/02/zucchini-fritters/', text:''},
  {veggieId:'zucchini',  name:'Zucchini Muffins',                  by:'Carolyn', url:'https://sallysbakingaddiction.com/zucchini-muffins/', text:''},
  {veggieId:'zucchini',  name:'Stuffed Zucchini',                  by:'Lauren',  url:'https://www.wellplated.com/stuffed-zucchini/', text:''},
  {veggieId:'zucchini',  name:'Zucchini Bread',                    by:'Carolyn', url:'https://www.allrecipes.com/recipe/238441/moms-spiced-zucchini-bread/', text:''}
];

let currentUser = null, isAdmin = false, activeVeggieId = null, allRecipes = {};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function closeModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
}

async function seedIfEmpty() {
  const snap = await getDocs(collection(db, 'recipes'));
  if (snap.empty) for (const r of seedRecipes) await addDoc(collection(db, 'recipes'), {...r, createdAt: Date.now()});
}

async function loadRecipes() {
  const snap = await getDocs(query(collection(db, 'recipes'), orderBy('createdAt')));
  allRecipes = {};
  snap.forEach(d => {
    const r = {id: d.id, ...d.data()};
    if (!allRecipes[r.veggieId]) allRecipes[r.veggieId] = [];
    allRecipes[r.veggieId].push(r);
  });
  renderGrid();
  if (activeVeggieId) openDetail(activeVeggieId);
}

function renderGrid() {
  const grid = document.getElementById('veggieGrid');
  grid.innerHTML = veggieData.map(v => {
    const count = (allRecipes[v.id] || []).length;
    return `
      <div class="veggie-tile" data-id="${v.id}">
        <div class="veggie-photo-wrap">
          <img class="veggie-photo" src="${v.img}" alt="${v.name}" loading="lazy" onerror="this.style.display='none'"/>
          ${count > 0 ? `<div class="veggie-badge">${count} recipe${count>1?'s':''}</div>` : ''}
        </div>
        <div class="veggie-info">
          <div class="veggie-name">${v.name}</div>
          <div class="veggie-count">${count===0?'No recipes yet':count+' recipe'+(count>1?'s':'')}</div>
        </div>
        <button class="nutrition-btn" data-nid="${v.id}" aria-label="Nutrition facts for ${v.name}">ⓘ</button>
      </div>`;
  }).join('');

  grid.querySelectorAll('.veggie-tile').forEach(tile => {
    tile.addEventListener('click', e => {
      if (e.target.closest('.nutrition-btn')) return;
      openDetail(tile.dataset.id);
    });
  });

  grid.querySelectorAll('.nutrition-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openNutModal(btn.dataset.nid);
    });
  });
}

function openNutModal(id) {
  const v = veggieData.find(v => v.id === id);
  document.getElementById('nutModalTitle').textContent = v.name + ' — Nutrition Facts';
  document.getElementById('nutModalBlurb').textContent = v.blurb;
  document.getElementById('nutModalGrid').innerHTML = `
    <div class="nut-card"><div class="nut-card-val">${v.nutrition.calories.split(' ')[0]}</div><div class="nut-card-label">Calories</div></div>
    <div class="nut-card"><div class="nut-card-val">${v.nutrition.protein}</div><div class="nut-card-label">Protein</div></div>
    <div class="nut-card"><div class="nut-card-val">${v.nutrition.fiber}</div><div class="nut-card-label">Fiber</div></div>
    <div class="nut-card"><div class="nut-card-val">${v.nutrition.vitC}</div><div class="nut-card-label">Vitamin C</div></div>`;
  document.getElementById('nutModalPer').textContent = `Per ${v.nutrition.per}`;
  document.getElementById('nutModal').classList.add('show');
}

document.getElementById('nutCloseBtn').onclick = () => document.getElementById('nutModal').classList.remove('show');
document.getElementById('nutModal').addEventListener('click', e => {
  if (e.target === document.getElementById('nutModal')) document.getElementById('nutModal').classList.remove('show');
});

function openDetail(id) {
  activeVeggieId = id;
  const veggie = veggieData.find(v => v.id === id);
  const recipes = allRecipes[id] || [];
  document.getElementById('gardenView').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  window.scrollTo(0, 0);

  document.getElementById('detailHero').innerHTML = `
    <img class="detail-hero-photo" src="${veggie.img}" alt="${veggie.name}"/>
    <div class="detail-hero-overlay">
      <div class="detail-hero-text">
        <h2>${veggie.name}</h2>
        <p>${recipes.length} shared recipe${recipes.length!==1?'s':''}</p>
      </div>
    </div>`;

  document.getElementById('detailBody').innerHTML = `
    ${isAdmin ? `<div class="admin-panel" id="adminPanel"><h4>🌾 Admin — Pending Approvals</h4><div id="pendingList"><p style="font-size:13px;color:#7a9a5a;">Loading...</p></div></div>` : ''}
    <div class="nutrition-strip-wrap">
      <div class="nutrition-strip-title">Nutrition Facts</div>
      <div class="nutrition-strip" style="margin-top:10px;">
        <div class="nut-stat"><div class="nut-stat-val">${veggie.nutrition.calories.split(' ')[0]}</div><div class="nut-stat-label">Calories</div></div>
        <div class="nut-stat"><div class="nut-stat-val">${veggie.nutrition.protein}</div><div class="nut-stat-label">Protein</div></div>
        <div class="nut-stat"><div class="nut-stat-val">${veggie.nutrition.fiber}</div><div class="nut-stat-label">Fiber</div></div>
        <div class="nut-stat"><div class="nut-stat-val">${veggie.nutrition.vitC}</div><div class="nut-stat-label">Vit C</div></div>
      </div>
      <div class="nutrition-blurb">${veggie.blurb}</div>
    </div>
    <div class="recipes-heading">Recipes</div>
    ${recipes.length===0
      ? `<div class="no-recipes">🌱 No recipes yet for ${veggie.name} — be the first to add one!</div>`
      : recipes.map(r=>`
          <div class="recipe-card" onclick="${r.url?`window.open('${r.url}','_blank')`:''}">
            <div class="recipe-card-top">
              <div class="recipe-card-name">${r.name}</div>
              ${r.url?'<span class="recipe-link-icon">↗</span>':''}
            </div>
            <div class="recipe-shared-by">Shared by ${r.by}</div>
          </div>`).join('')
    }
    <button class="add-recipe-btn" id="detailAddBtn">+ Add a Recipe for ${veggie.name}</button>`;

  document.getElementById('detailAddBtn').onclick = () => openAddModal(id);
  if (isAdmin) bindAdminButtons();
}

document.getElementById('backBtn').onclick = () => {
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('gardenView').style.display = 'block';
  activeVeggieId = null;
  window.scrollTo(0, 0);
};

async function bindAdminButtons() {
  const snap = await getDocs(collection(db, 'users'));
  const pending = [];
  snap.forEach(d => { const u={id:d.id,...d.data()}; if(u.status==='pending') pending.push(u); });
  const list = document.getElementById('pendingList');
  if (!list) return;
  if (pending.length===0) { list.innerHTML='<p style="font-size:13px;color:#7a9a5a;">No pending approvals.</p>'; return; }
  list.innerHTML = pending.map(u=>`
    <div class="pending-user-row">
      <span class="pending-user-name">${u.username}</span>
      <div class="pending-actions">
        <button class="btn-approve" data-uid="${u.id}" data-uname="${u.username}">Approve</button>
        <button class="btn-deny" data-uid="${u.id}">Deny</button>
      </div>
    </div>`).join('');
  list.querySelectorAll('.btn-approve').forEach(btn => {
    btn.addEventListener('click', async () => {
      await setDoc(doc(db,'users',btn.dataset.uid),{username:btn.dataset.uname,status:'approved'});
      showToast(`${btn.dataset.uname} approved!`); bindAdminButtons();
    });
  });
  list.querySelectorAll('.btn-deny').forEach(btn => {
    btn.addEventListener('click', async () => {
      await deleteDoc(doc(db,'users',btn.dataset.uid));
      showToast('User removed.'); bindAdminButtons();
    });
  });
}

function openAddModal(veggieId) {
  if (!currentUser) { showToast('Please sign in first.'); document.getElementById('loginModal').classList.add('show'); return; }
  document.getElementById('recipeVeggie').innerHTML = veggieData.map(v=>`<option value="${v.id}" ${v.id===veggieId?'selected':''}>${v.name}</option>`).join('');
  document.getElementById('addModalUserBar').innerHTML = `Sharing as <strong>${currentUser}</strong>`;
  document.getElementById('addModal').classList.add('show');
}

document.getElementById('loginBtn').onclick = () => {
  document.getElementById('passwordGroup').style.display = 'none';
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('usernameInput').value = currentUser || '';
  document.getElementById('loginModal').classList.add('show');
};
document.getElementById('loginCancel').onclick = closeModals;
document.getElementById('addCancel').onclick = closeModals;

document.getElementById('usernameInput').addEventListener('input', function() {
  document.getElementById('passwordGroup').style.display =
    this.value.trim().toLowerCase() === ADMIN_USER.toLowerCase() ? 'block' : 'none';
});

document.getElementById('loginSubmit').onclick = async () => {
  const username = document.getElementById('usernameInput').value.trim();
  if (!username) { closeModals(); return; }
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (username.toLowerCase() === ADMIN_USER.toLowerCase()) {
    if (document.getElementById('passwordInput').value !== ADMIN_PASS) {
      errEl.style.cssText = 'display:block;background:#fde8e8;color:#c05030;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:12px;';
      errEl.textContent = 'Incorrect password.'; return;
    }
    currentUser = ADMIN_USER; isAdmin = true;
    localStorage.setItem('nf_username', ADMIN_USER); localStorage.setItem('nf_admin', '1');
    document.getElementById('loginBtn').textContent = '🌾 Denton';
    closeModals(); showToast('Welcome back, Denton!'); return;
  }

  const userRef = doc(db, 'users', username.toLowerCase());
  const userSnap = await getDoc(userRef);
  if (!userSnap.exists()) {
    await setDoc(userRef, {username, status:'pending'});
    errEl.style.cssText = 'display:block;background:#fff3cd;color:#856404;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:12px;line-height:1.5;';
    errEl.textContent = `Thanks ${username}! Your username is pending Denton's approval. Browse away in the meantime!`;
    currentUser = username; localStorage.setItem('nf_username', username);
    document.getElementById('loginBtn').textContent = '👤 ' + username + ' (pending)'; return;
  }

  const userData = userSnap.data();
  if (userData.status === 'pending') {
    errEl.style.cssText = 'display:block;background:#fff3cd;color:#856404;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:12px;';
    errEl.textContent = 'Your username is still pending approval. Check back soon!';
    currentUser = username; localStorage.setItem('nf_username', username);
    document.getElementById('loginBtn').textContent = '👤 ' + username + ' (pending)'; return;
  }

  currentUser = username; isAdmin = false;
  localStorage.setItem('nf_username', username); localStorage.removeItem('nf_admin');
  document.getElementById('loginBtn').textContent = '👤 ' + username;
  closeModals(); showToast(`Welcome back, ${username}!`);
};

document.querySelectorAll('input[name="shareType"]').forEach(r => {
  r.addEventListener('change', () => {
    document.getElementById('linkGroup').style.display = r.value==='link' ? 'block' : 'none';
    document.getElementById('textGroup').style.display = r.value==='text' ? 'block' : 'none';
  });
});

document.getElementById('addBtn').onclick = () => openAddModal(veggieData[0].id);

document.getElementById('addSubmit').onclick = async () => {
  if (!currentUser) return;
  const userSnap = await getDoc(doc(db, 'users', currentUser.toLowerCase()));
  if (!isAdmin && !(userSnap.exists() && userSnap.data().status==='approved')) {
    showToast('Your username is still pending approval.'); closeModals(); return;
  }
  const veggieId = document.getElementById('recipeVeggie').value;
  const name = document.getElementById('recipeName').value.trim();
  const shareType = document.querySelector('input[name="shareType"]:checked').value;
  const url = document.getElementById('recipeUrl').value.trim();
  const text = document.getElementById('recipeText').value.trim();
  if (!name) return;
  await addDoc(collection(db, 'recipes'), {
    veggieId, name, by: currentUser,
    url: shareType==='link' ? url : '',
    text: shareType==='text' ? text : '',
    createdAt: Date.now()
  });
  closeModals(); showToast('Recipe added!');
  document.getElementById('recipeName').value = '';
  document.getElementById('recipeUrl').value = '';
  document.getElementById('recipeText').value = '';
  await loadRecipes();
};

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target===o) closeModals(); });
});

async function restoreSession() {
  const savedUser = localStorage.getItem('nf_username');
  const savedAdmin = localStorage.getItem('nf_admin');
  if (!savedUser) return;
  currentUser = savedUser;
  if (savedAdmin) { isAdmin=true; document.getElementById('loginBtn').textContent='🌾 Denton'; return; }
  const userSnap = await getDoc(doc(db, 'users', savedUser.toLowerCase()));
  const status = userSnap.exists() ? userSnap.data().status : 'pending';
  document.getElementById('loginBtn').textContent = status==='approved' ? '👤 '+savedUser : '👤 '+savedUser+' (pending)';
}

await seedIfEmpty();
await restoreSession();
await loadRecipes();
</script>
</body>
</html>
