<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Northaven Farms Recipe Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', sans-serif; background: #f4f1e8; min-height: 100vh; color: #2d3a1e; }
  .app-header { background: #2d4a1e; padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .app-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: #e8f0d8; letter-spacing: 0.3px; }
  .app-title span { color: #9dc854; font-style: italic; }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .btn-outline { background: transparent; border: 1.5px solid #9dc854; color: #9dc854; padding: 7px 16px; border-radius: 20px; font-family: 'Lato', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .btn-outline:hover { background: #9dc854; color: #1a2e0a; }
  .btn-primary { background: #9dc854; border: none; color: #1a2e0a; padding: 7px 16px; border-radius: 20px; font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-primary:hover { background: #b8d96f; }
  .garden-view { padding: 28px; }
  .section-label { font-family: 'Playfair Display', serif; font-size: 15px; color: #5c7a3a; margin-bottom: 20px; letter-spacing: 0.5px; }
  .veggie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
  .veggie-tile { background: #ffffff; border-radius: 14px; overflow: visible; cursor: pointer; transition: transform 0.18s, box-shadow 0.18s; border: 1.5px solid #d8e8c0; position: relative; }
  .veggie-tile:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(45,74,30,0.15); border-color: #9dc854; }
  .veggie-illustration { width: 100%; height: 110px; display: flex; align-items: center; justify-content: center; border-radius: 12px 12px 0 0; position: relative; overflow: hidden; }
  .veggie-illustration svg { width: 80px; height: 80px; }
  .veggie-badge { position: absolute; top: 8px; right: 8px; background: #2d4a1e; color: #9dc854; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; z-index: 2; }
  .veggie-info { padding: 10px 12px 28px; }
  .veggie-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: #2d3a1e; margin-bottom: 3px; }
  .veggie-count { font-size: 11px; color: #7a9a5a; }
  .nutrition-btn { position: absolute; bottom: 8px; right: 8px; width: 22px; height: 22px; background: #2d4a1e; color: #9dc854; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 5; border: none; font-family: 'Lato', sans-serif; transition: background 0.2s; }
  .nutrition-btn:hover { background: #4a7a2a; }
  .nutrition-panel { display: none; position: absolute; bottom: 36px; right: 6px; width: 190px; background: #2d4a1e; border-radius: 10px; padding: 12px 14px; z-index: 20; box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
  .nutrition-panel.show { display: block; }
  .nutrition-panel h4 { font-family: 'Playfair Display', serif; font-size: 13px; color: #9dc854; margin-bottom: 8px; font-weight: 600; }
  .nut-row { display: flex; justify-content: space-between; font-size: 11px; color: #c8dca8; padding: 2px 0; border-bottom: 0.5px solid rgba(157,200,84,0.2); }
  .nut-row:last-child { border-bottom: none; }
  .nut-val { font-weight: 700; color: #e8f0d8; }
  .detail-view { display: none; }
  .detail-hero { background: linear-gradient(135deg, #2d4a1e 0%, #3d6428 100%); padding: 24px 28px 28px; }
  .detail-hero-inner { display: flex; align-items: center; gap: 20px; margin-top: 14px; }
  .detail-svg-wrap { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; border-radius: 12px; padding: 6px; flex-shrink: 0; }
  .detail-svg-wrap svg { width: 68px; height: 68px; }
  .detail-hero-text h2 { font-family: 'Playfair Display', serif; font-size: 26px; color: #e8f0d8; font-weight: 600; }
  .detail-hero-text p { font-size: 13px; color: #9dc854; margin-top: 4px; }
  .back-btn { background: transparent; border: none; color: #9dc854; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'Lato', sans-serif; }
  .back-btn:hover { color: #c8e88f; }
  .detail-body { padding: 24px 28px; }
  .nutrition-strip { background: #fff; border-radius: 12px; border: 1.5px solid #d8e8c0; padding: 16px 20px; margin-bottom: 24px; display: flex; }
  .nut-stat { flex: 1; text-align: center; padding: 0 8px; border-right: 1px solid #d8e8c0; }
  .nut-stat:last-child { border-right: none; }
  .nut-stat-val { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: #3d6428; }
  .nut-stat-label { font-size: 10px; color: #7a9a5a; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .recipes-heading { font-family: 'Playfair Display', serif; font-size: 18px; color: #2d3a1e; margin-bottom: 14px; font-weight: 600; }
  .recipe-card { background: #fff; border-radius: 12px; border: 1.5px solid #d8e8c0; padding: 16px 18px; margin-bottom: 12px; transition: border-color 0.2s, transform 0.15s; cursor: pointer; }
  .recipe-card:hover { border-color: #9dc854; transform: translateX(3px); }
  .recipe-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .recipe-card-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: #2d3a1e; }
  .recipe-link-icon { font-size: 14px; color: #9dc854; flex-shrink: 0; }
  .recipe-shared-by { font-size: 11px; color: #7a9a5a; margin-top: 4px; }
  .no-recipes { background: #f0f4e8; border-radius: 12px; padding: 20px; text-align: center; color: #7a9a5a; font-size: 14px; border: 1.5px dashed #c0d890; }
  .add-recipe-btn { background: #2d4a1e; color: #9dc854; border: none; border-radius: 10px; padding: 12px 20px; font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 16px; transition: background 0.2s; }
  .add-recipe-btn:hover { background: #3d6428; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(20,35,10,0.6); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #f4f1e8; border-radius: 16px; padding: 28px; width: 90%; max-width: 480px; max-height: 80vh; overflow-y: auto; }
  .modal h3 { font-family: 'Playfair Display', serif; font-size: 20px; color: #2d3a1e; margin-bottom: 20px; font-weight: 600; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; color: #5c7a3a; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1.5px solid #c0d890; background: #fff; font-family: 'Lato', sans-serif; font-size: 14px; color: #2d3a1e; outline: none; transition: border-color 0.2s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #9dc854; }
  .form-group textarea { height: 100px; resize: vertical; }
  .radio-group { display: flex; gap: 16px; }
  .radio-label { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #2d3a1e; cursor: pointer; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel { flex: 1; background: transparent; border: 1.5px solid #c0d890; color: #5c7a3a; padding: 10px; border-radius: 8px; font-family: 'Lato', sans-serif; font-size: 14px; cursor: pointer; }
  .btn-submit { flex: 2; background: #2d4a1e; border: none; color: #9dc854; padding: 10px; border-radius: 8px; font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn-submit:hover { background: #3d6428; }
  .username-bar { background: #e8f2d4; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 13px; color: #3d6428; }
  @media (max-width: 480px) {
    .app-header { padding: 14px 16px; }
    .app-title { font-size: 16px; }
    .garden-view { padding: 16px; }
    .veggie-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
    .detail-body { padding: 16px; }
    .detail-hero { padding: 16px; }
    .nutrition-strip { flex-wrap: wrap; }
    .nut-stat { min-width: 50%; border-right: none; border-bottom: 1px solid #d8e8c0; padding: 6px 0; }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">Northaven Farms <span>Recipe Book</span></div>
  <div class="header-actions">
    <button class="btn-outline" id="loginBtn">Sign In</button>
    <button class="btn-primary" id="addBtn">+ Add Recipe</button>
  </div>
</div>

<div class="garden-view" id="gardenView">
  <p class="section-label">🌿 Pick a vegetable to explore recipes — tap the ⓘ for nutrition facts</p>
  <div class="veggie-grid" id="veggieGrid"></div>
</div>

<div class="detail-view" id="detailView">
  <div class="detail-hero" id="detailHero"></div>
  <div class="detail-body" id="detailBody"></div>
</div>

<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h3>🌱 Welcome to Northaven Farms</h3>
    <div class="form-group">
      <label>Your Username</label>
      <input type="text" id="usernameInput" placeholder="e.g. Carolyn, Jackie, Lauren..."/>
    </div>
    <p style="font-size:12px;color:#7a9a5a;margin-top:-6px;">You can browse anonymously, but a username lets you share recipes with attribution.</p>
    <div class="modal-actions">
      <button class="btn-cancel" id="loginCancel">Browse anonymously</button>
      <button class="btn-submit" id="loginSubmit">Save username</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>🥬 Share a Recipe</h3>
    <div class="username-bar" id="addModalUserBar"></div>
    <div class="form-group">
      <label>Vegetable</label>
      <select id="recipeVeggie"></select>
    </div>
    <div class="form-group">
      <label>Recipe Name</label>
      <input type="text" id="recipeName" placeholder="e.g. Stuffed Zucchini"/>
    </div>
    <div class="form-group">
      <label>How are you sharing?</label>
      <div class="radio-group">
        <label class="radio-label"><input type="radio" name="shareType" value="link" checked> Link to recipe</label>
        <label class="radio-label"><input type="radio" name="shareType" value="text"> Type it out</label>
      </div>
    </div>
    <div class="form-group" id="linkGroup">
      <label>Recipe URL</label>
      <input type="url" id="recipeUrl" placeholder="https://..."/>
    </div>
    <div class="form-group" id="textGroup" style="display:none;">
      <label>Recipe Text</label>
      <textarea id="recipeText" placeholder="Ingredients and steps..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="addCancel">Cancel</button>
      <button class="btn-submit" id="addSubmit">Share Recipe</button>
    </div>
  </div>
</div>

let currentUser = null;
let activeVeggie = null;

function renderGrid() {
  const grid = document.getElementById('veggieGrid');
  grid.innerHTML = veggies.map(v => `
    <div class="veggie-tile" data-id="${v.id}">
      <div class="veggie-illustration" style="background:${v.bg};">
        ${svgs[v.id] || ''}
        ${v.recipes.length > 0 ? `<div class="veggie-badge">${v.recipes.length}</div>` : ''}
      </div>
      <div class="veggie-info">
        <div class="veggie-name">${v.name}</div>
        <div class="veggie-count">${v.recipes.length === 0 ? 'No recipes yet' : v.recipes.length + ' recipe' + (v.recipes.length > 1 ? 's' : '')}</div>
      </div>
      <button class="nutrition-btn" data-nid="${v.id}">ⓘ</button>
      <div class="nutrition-panel" id="nut-${v.id}">
        <h4>Per ${v.nutrition.per}</h4>
        <div class="nut-row"><span>Calories</span><span class="nut-val">${v.nutrition.calories}</span></div>
        <div class="nut-row"><span>Protein</span><span class="nut-val">${v.nutrition.protein}</span></div>
        <div class="nut-row"><span>Fiber</span><span class="nut-val">${v.nutrition.fiber}</span></div>
        <div class="nut-row"><span>Vitamin C</span><span class="nut-val">${v.nutrition.vitC}</span></div>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.veggie-tile').forEach(tile => {
    tile.addEventListener('click', e => {
      if (e.target.closest('.nutrition-btn') || e.target.closest('.nutrition-panel')) return;
      openDetail(tile.dataset.id);
    });
  });

  grid.querySelectorAll('.nutrition-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const nid = btn.dataset.nid;
      const panel = document.getElementById('nut-' + nid);
      const isOpen = panel.classList.contains('show');
      document.querySelectorAll('.nutrition-panel').forEach(p => p.classList.remove('show'));
      if (!isOpen) panel.classList.add('show');
    });
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.nutrition-btn') && !e.target.closest('.nutrition-panel')) {
      document.querySelectorAll('.nutrition-panel').forEach(p => p.classList.remove('show'));
    }
  });
}

function openDetail(id) {
  activeVeggie = veggies.find(v => v.id === id);
  document.getElementById('gardenView').style.display = 'none';
  const dv = document.getElementById('detailView');
  dv.style.display = 'block';

  document.getElementById('detailHero').innerHTML = `
    <button class="back-btn" id="backBtn">← Back to Garden</button>
    <div class="detail-hero-inner">
      <div class="detail-svg-wrap" style="background:${activeVeggie.bg}; width:80px; height:80px; display:flex; align-items:center; justify-content:center; border-radius:12px; padding:6px; flex-shrink:0;">
        ${svgs[activeVeggie.id] || ''}
      </div>
      <div class="detail-hero-text">
        <h2>${activeVeggie.name}</h2>
        <p>${activeVeggie.recipes.length} shared recipe${activeVeggie.recipes.length !== 1 ? 's' : ''}</p>
      </div>
    </div>
  `;

  document.getElementById('detailBody').innerHTML = `
    <div class="nutrition-strip">
      <div class="nut-stat"><div class="nut-stat-val">${activeVeggie.nutrition.calories.split(' ')[0]}</div><div class="nut-stat-label">Calories</div></div>
      <div class="nut-stat"><div class="nut-stat-val">${activeVeggie.nutrition.protein}</div><div class="nut-stat-label">Protein</div></div>
      <div class="nut-stat"><div class="nut-stat-val">${activeVeggie.nutrition.fiber}</div><div class="nut-stat-label">Fiber</div></div>
      <div class="nut-stat"><div class="nut-stat-val">${activeVeggie.nutrition.vitC}</div><div class="nut-stat-label">Vit C</div></div>
    </div>
    <div class="recipes-heading">Recipes</div>
    ${activeVeggie.recipes.length === 0
      ? `<div class="no-recipes">🌱 No recipes yet for ${activeVeggie.name} — be the first to add one!</div>`
      : activeVeggie.recipes.map(r => `
        <div class="recipe-card" onclick="${r.url ? `openLink('${r.url}')` : ''}">
          <div class="recipe-card-top">
            <div class="recipe-card-name">${r.name}</div>
            ${r.url ? '<span class="recipe-link-icon">↗</span>' : ''}
          </div>
          <div class="recipe-shared-by">Shared by ${r.by}</div>
        </div>`).join('')
    }
    <button class="add-recipe-btn" id="detailAddBtn">+ Add a Recipe for ${activeVeggie.name}</button>
  `;

  document.getElementById('backBtn').onclick = () => {
    dv.style.display = 'none';
    document.getElementById('gardenView').style.display = 'block';
  };
  document.getElementById('detailAddBtn').onclick = () => openAddModal(id);
}

function openLink(url) { if (url) window.open(url, '_blank'); }

function openAddModal(veggieId) {
  const sel = document.getElementById('recipeVeggie');
  sel.innerHTML = veggies.map(v => `<option value="${v.id}" ${v.id === veggieId ? 'selected' : ''}>${v.name}</option>`).join('');
  const bar = document.getElementById('addModalUserBar');
  bar.innerHTML = currentUser
    ? `Sharing as <strong>${currentUser}</strong>`
    : `Browsing anonymously — <a href="#" id="signInLink" style="color:#3d6428;">set a username</a> to get credit.`;
  if (!currentUser) {
    setTimeout(() => {
      document.getElementById('signInLink')?.addEventListener('click', e => {
        e.preventDefault(); closeModals();
        document.getElementById('loginModal').classList.add('show');
      });
    }, 100);
  }
  document.getElementById('addModal').classList.add('show');
}

function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show')); }

document.querySelectorAll('input[name="shareType"]').forEach(r => {
  r.addEventListener('change', () => {
    document.getElementById('linkGroup').style.display = r.value === 'link' ? 'block' : 'none';
    document.getElementById('textGroup').style.display = r.value === 'text' ? 'block' : 'none';
  });
});

document.getElementById('loginBtn').onclick = () => document.getElementById('loginModal').classList.add('show');
document.getElementById('loginCancel').onclick = closeModals;
document.getElementById('addBtn').onclick = () => openAddModal(veggies[0].id);
document.getElementById('addCancel').onclick = closeModals;

document.getElementById('loginSubmit').onclick = () => {
  const val = document.getElementById('usernameInput').value.trim();
  if (val) { currentUser = val; document.getElementById('loginBtn').textContent = '👤 ' + val; }
  closeModals();
};

document.getElementById('addSubmit').onclick = () => {
  const veggieId = document.getElementById('recipeVeggie').value;
  const name = document.getElementById('recipeName').value.trim();
  const shareType = document.querySelector('input[name="shareType"]:checked').value;
  const url = document.getElementById('recipeUrl').value.trim();
  const text = document.getElementById('recipeText').value.trim();
  if (!name) return;
  const veggie = veggies.find(v => v.id === veggieId);
  veggie.recipes.push({ name, by: currentUser || 'Anonymous', url: shareType === 'link' ? url : '', text: shareType === 'text' ? text : '' });
  closeModals();
  renderGrid();
  if (activeVeggie && activeVeggie.id === veggieId) openDetail(veggieId);
  document.getElementById('recipeName').value = '';
  document.getElementById('recipeUrl').value = '';
  document.getElementById('recipeText').value = '';
};

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModals(); });
});

renderGrid();
</script>
</body>
</html>
